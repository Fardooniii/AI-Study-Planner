{% extends 'main/base.html' %}

{% block content %}
<div class="center-box">
    <h1>Welcome to AI Study Analyzer</h1>
    <p>Track your tasks, study hours, and get AI-powered insights.</p>

    {% if not user.is_authenticated %}
        <a class="btn" href="{% url 'signup' %}">Sign Up</a>
        <a class="btn" href="{% url 'login' %}">Login</a>
    {% else %}
        <a class="btn" href="{% url 'dashboard' %}">Go to Dashboard</a>
    {% endif %}
</div>
{% endblock %}
