{% extends 'main/base.html' %}

{% block content %}
<div class="center-box">
    <h2>Sign Up</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn" type="submit">Sign Up</button>
    </form>
    <p class="mt-2">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
</div>
{% endblock %}
