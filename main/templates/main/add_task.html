{% extends 'main/base.html' %}

{% block content %}
<div class="center-box">
    <h2>Add Task</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn mt-2" type="submit">Save Task</button>
    </form>
    <a href="{% url 'dashboard' %}" class="mt-2">Back to Dashboard</a>
</div>
{% endblock %}
